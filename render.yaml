# Деплой на Render (бесплатный web-сервис). Импортируйте репозиторий —
# Render подхватит этот файл (Blueprint) и развернёт приложение.
services:
  - type: web
    name: wordstat-otp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 90
